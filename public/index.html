<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interverse — voice interview practice</title>
  <meta name="description" content="Interverse: an AI voice interviewer. Practice interviews, build confidence, sharpen vocabulary." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=4" />
</head>
<body>
  <!-- ============ AUTH ============ -->
  <div id="auth-screen" class="auth-wrap" style="display:none">
    <div class="auth-card">
      <div class="brand-mark">◍</div>
      <div class="display brand-name">Interverse</div>
      <div class="brand-sub">Your AI interview room. Speak, get grilled, get better.</div>

      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab sel" onclick="showAuthTab('login')">Sign in</button>
        <button id="tab-register" class="auth-tab" onclick="showAuthTab('register')">Create account</button>
      </div>

      <div id="pane-login" class="auth-pane">
        <input id="li-email" class="input" type="email" placeholder="Email" autocomplete="email" />
        <input id="li-pass" class="input" type="password" placeholder="Password" autocomplete="current-password" />
        <button class="btn btn-primary btn-block" onclick="doLogin()">Sign in</button>
        <button class="btn-link" onclick="showForgot()">Forgot password?</button>
      </div>

      <div id="pane-forgot" class="auth-pane" style="display:none">
        <div class="otp-note">Enter your account email — we'll send a 6-digit reset code.</div>
        <input id="fp-email" class="input" type="email" placeholder="Email" autocomplete="email" />
        <button class="btn btn-primary btn-block" onclick="doForgotStart()">Send reset code</button>
        <button class="btn-link" onclick="showAuthTab('login')">Back to sign in</button>
      </div>

      <div id="pane-reset" class="auth-pane" style="display:none">
        <div class="otp-note">Code sent to <b id="reset-email-label"></b>. Enter it with your new password.</div>
        <input id="rp-code" class="input otp-input" inputmode="numeric" maxlength="6" placeholder="······" />
        <input id="rp-pass" class="input" type="password" placeholder="New password (8+ characters)" autocomplete="new-password" />
        <button class="btn btn-primary btn-block" onclick="doResetPassword()">Reset password</button>
        <button class="btn-link" onclick="doForgotStart()">Resend code</button>
      </div>

      <div id="pane-register" class="auth-pane" style="display:none">
        <input id="rg-name" class="input" type="text" placeholder="Your name" autocomplete="name" />
        <input id="rg-email" class="input" type="email" placeholder="Email" autocomplete="email" />
        <input id="rg-pass" class="input" type="password" placeholder="Password (8+ characters)" autocomplete="new-password" />
        <button class="btn btn-primary btn-block" onclick="doRegister()">Create account</button>
      </div>

      <div id="pane-otp" class="auth-pane" style="display:none">
        <div class="otp-note">We emailed a 6-digit code to <b id="otp-email-label"></b>. Enter it to verify your address.</div>
        <input id="otp-code" class="input otp-input" inputmode="numeric" maxlength="6" placeholder="······" />
        <button class="btn btn-primary btn-block" onclick="doVerifyOtp()">Verify email</button>
        <button class="btn-link" onclick="doResendOtp()">Resend code</button>
      </div>

      <div id="auth-msg" class="auth-msg"></div>
    </div>
  </div>

  <!-- ============ APP SHELL ============ -->
  <div id="app-shell" class="shell" style="display:none">
    <aside class="sidebar">
      <button class="side-brand" onclick="goNewSession()" title="Home" style="background:none;border:none;cursor:pointer;padding:2px 4px 6px;font-family:inherit;color:inherit">
        <span class="brand-mark sm">◍</span>
        <span class="display">Interverse</span>
      </button>
      <button class="btn btn-primary btn-block" onclick="goNewSession()">+ New session</button>
      <div class="side-label">SAVED SESSIONS</div>
      <div id="conv-list" class="conv-list"></div>
      <div class="side-foot">
        <div class="user-chip">
          <span id="user-avatar" class="avatar"></span>
          <span id="user-name" class="user-name"></span>
        </div>
        <button class="btn-link" onclick="doLogout()">Sign out</button>
      </div>
    </aside>

    <button id="side-toggle" class="side-toggle" onclick="toggleSidebar()" aria-label="Toggle saved sessions">☰</button>

    <main class="main">
      <div class="main-head">
        <div>
          <div class="eyebrow" id="head-eyebrow">PRACTICE ROOM</div>
          <div class="display main-title" id="head-title">New session</div>
        </div>
        <span id="onair" class="onair" style="display:none"><span class="dot"></span><span id="onair-text">ON AIR</span></span>
      </div>
      <div id="view"></div>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/app.js?v=7"></script>
</body>
</html>
